<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>014 — Cumulative Degradation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
#info {
  position: fixed; bottom: 16px; left: 16px; right: 16px;
  color: rgba(180,180,180,0.6); font-size: 11px; pointer-events: none;
  z-index: 10;
}
#cycle-count {
  position: fixed; top: 16px; right: 16px;
  color: rgba(255,255,255,0.3); font-size: 13px; font-family: 'Courier New', monospace;
  z-index: 10;
}
#fidelity {
  position: fixed; top: 16px; left: 16px;
  color: rgba(255,255,255,0.3); font-size: 13px; font-family: 'Courier New', monospace;
  z-index: 10;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="cycle-count">cycle 0</div>
<div id="fidelity">fidelity 100%</div>
<div id="info">tap: compress cycle &nbsp;|&nbsp; hold: resist degradation &nbsp;|&nbsp; space: reset to origin</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cycleEl = document.getElementById('cycle-count');
const fidelityEl = document.getElementById('fidelity');

let W, H, cellSize, cols, rows;
let original = [];    // the pristine signal
let current = [];     // what remains after degradation
let display = [];     // interpolated display state
let cycle = 0;
let transitioning = false;
let transitionProgress = 0;
let holding = false;
let holdStrength = 0;
let audioCtx = null;
let droneOsc = null;
let droneGain = null;
let noiseNode = null;
let noiseGain = null;
let lfo = null;
let lfoGain = null;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cellSize = Math.max(4, Math.min(12, Math.floor(Math.min(W, H) / 80)));
  cols = Math.floor(W / cellSize);
  rows = Math.floor(H / cellSize);
}

function generateOriginal() {
  original = [];
  // Create a structured signal: concentric rings with color gradients
  const cx = cols / 2, cy = rows / 2;
  const maxR = Math.sqrt(cx * cx + cy * cy);
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const dx = x - cx, dy = y - cy;
      const r = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx);
      const ringPhase = (r / maxR) * 8 * Math.PI;
      const spiralPhase = angle * 3 + r * 0.15;
      
      const h = ((angle / Math.PI * 180) + 360) % 360;
      const s = 0.5 + 0.5 * Math.sin(ringPhase);
      const l = 0.25 + 0.35 * Math.cos(spiralPhase) + 0.1 * Math.sin(r * 0.3);
      
      original.push({ h, s, l: Math.max(0.05, Math.min(0.7, l)), energy: s });
    }
  }
  current = original.map(c => ({ ...c }));
  display = original.map(c => ({ ...c }));
}

function degrade() {
  const severity = Math.min(0.4, 0.02 + cycle * 0.008); // gets worse each cycle
  const prev = current.map(c => ({ ...c }));
  
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = y * cols + x;
      const cell = prev[i];
      
      // Quantization: reduce precision
      const qFactor = Math.max(2, 360 - cycle * 15);
      let newH = Math.round(cell.h / (360 / qFactor)) * (360 / qFactor);
      
      // Blur: average with neighbors (lossy compression)
      let avgH = cell.h, avgS = cell.s, avgL = cell.l, count = 1;
      const blurRadius = Math.min(3, 1 + Math.floor(cycle / 5));
      for (let dy = -blurRadius; dy <= blurRadius; dy++) {
        for (let dx = -blurRadius; dx <= blurRadius; dx++) {
          if (dx === 0 && dy === 0) continue;
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
            const ni = ny * cols + nx;
            const weight = 1 / (Math.abs(dx) + Math.abs(dy));
            avgH += prev[ni].h * weight;
            avgS += prev[ni].s * weight;
            avgL += prev[ni].l * weight;
            count += weight;
          }
        }
      }
      
      // Mix blur with quantization
      const blurMix = Math.min(0.7, severity * 1.5);
      newH = newH * (1 - blurMix) + (avgH / count) * blurMix;
      let newS = cell.s * (1 - severity * 0.3) + (avgS / count) * severity * 0.3;
      let newL = cell.l * (1 - severity * 0.2) + (avgL / count) * severity * 0.2;
      
      // Random noise injection (artifacts from re-encoding)
      if (Math.random() < severity * 0.15) {
        newH += (Math.random() - 0.5) * 30 * severity;
        newS += (Math.random() - 0.5) * 0.1;
      }
      
      // Saturation decay
      newS *= (1 - severity * 0.08);
      
      // Energy loss
      const newEnergy = cell.energy * (1 - severity * 0.12);
      
      // Hold resistance: if holding, partially preserve from original
      if (holding && holdStrength > 0) {
        const preserve = holdStrength * 0.3;
        newH = newH * (1 - preserve) + original[i].h * preserve;
        newS = newS * (1 - preserve) + original[i].s * preserve;
        newL = newL * (1 - preserve) + original[i].l * preserve;
      }
      
      current[i] = {
        h: ((newH % 360) + 360) % 360,
        s: Math.max(0, Math.min(1, newS)),
        l: Math.max(0.02, Math.min(0.7, newL)),
        energy: Math.max(0, newEnergy)
      };
    }
  }
}

function computeFidelity() {
  let totalDiff = 0;
  for (let i = 0; i < original.length; i++) {
    const dh = Math.abs(original[i].h - current[i].h) / 360;
    const ds = Math.abs(original[i].s - current[i].s);
    const dl = Math.abs(original[i].l - current[i].l);
    totalDiff += (dh + ds + dl) / 3;
  }
  return Math.max(0, 100 - (totalDiff / original.length) * 300);
}

function triggerCycle() {
  if (transitioning) return;
  cycle++;
  degrade();
  transitioning = true;
  transitionProgress = 0;
  
  // Update audio
  if (droneOsc) {
    const fidelity = computeFidelity();
    const baseFreq = 55 + (100 - fidelity) * 1.5; // pitch rises as fidelity drops
    droneOsc.frequency.setTargetAtTime(baseFreq, audioCtx.currentTime, 0.5);
    droneGain.gain.setTargetAtTime(0.08 + cycle * 0.003, audioCtx.currentTime, 0.3);
    noiseGain.gain.setTargetAtTime(Math.min(0.06, cycle * 0.002), audioCtx.currentTime, 0.5);
    lfo.frequency.setTargetAtTime(0.3 + cycle * 0.1, audioCtx.currentTime, 0.5);
  }
  
  cycleEl.textContent = `cycle ${cycle}`;
  const fid = computeFidelity();
  fidelityEl.textContent = `fidelity ${fid.toFixed(1)}%`;
  fidelityEl.style.color = `rgba(255,${Math.floor(fid * 2.55)},${Math.floor(fid * 1.5)},0.5)`;
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  // Drone oscillator
  droneOsc = audioCtx.createOscillator();
  droneOsc.type = 'sawtooth';
  droneOsc.frequency.value = 55;
  
  droneGain = audioCtx.createGain();
  droneGain.gain.value = 0.06;
  
  // LFO for tremolo
  lfo = audioCtx.createOscillator();
  lfo.frequency.value = 0.3;
  lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 0.03;
  lfo.connect(lfoGain);
  lfoGain.connect(droneGain.gain);
  lfo.start();
  
  // Filter
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  filter.Q.value = 2;
  
  droneOsc.connect(filter);
  filter.connect(droneGain);
  droneGain.connect(audioCtx.destination);
  droneOsc.start();
  
  // Noise layer (compression artifacts)
  const bufferSize = audioCtx.sampleRate * 2;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.5;
  }
  noiseNode = audioCtx.createBufferSource();
  noiseNode.buffer = noiseBuffer;
  noiseNode.loop = true;
  
  noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0.005;
  
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 800;
  noiseFilter.Q.value = 1;
  
  noiseNode.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseNode.start();
}

function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);
  
  // Update transition
  if (transitioning) {
    transitionProgress += 0.03;
    if (transitionProgress >= 1) {
      transitionProgress = 1;
      transitioning = false;
    }
  }
  
  // Update hold strength
  if (holding) {
    holdStrength = Math.min(1, holdStrength + 0.02);
  } else {
    holdStrength = Math.max(0, holdStrength - 0.05);
  }
  
  // Interpolate display
  for (let i = 0; i < current.length; i++) {
    const t = transitioning ? transitionProgress : 1;
    display[i].h += (current[i].h - display[i].h) * t * 0.15;
    display[i].s += (current[i].s - display[i].s) * t * 0.15;
    display[i].l += (current[i].l - display[i].l) * t * 0.15;
  }
  
  // Draw cells
  const offsetX = (W - cols * cellSize) / 2;
  const offsetY = (H - rows * cellSize) / 2;
  
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = y * cols + x;
      const cell = display[i];
      const px = offsetX + x * cellSize;
      const py = offsetY + y * cellSize;
      
      // During hold, show ghost of original
      if (holdStrength > 0.1) {
        const orig = original[i];
        ctx.fillStyle = `hsla(${orig.h}, ${orig.s * 100}%, ${orig.l * 100}%, ${holdStrength * 0.15})`;
        ctx.fillRect(px, py, cellSize - 0.5, cellSize - 0.5);
      }
      
      ctx.fillStyle = `hsl(${cell.h}, ${cell.s * 100}%, ${cell.l * 100}%)`;
      ctx.fillRect(px + 0.25, py + 0.25, cellSize - 1, cellSize - 1);
    }
  }
  
  // Scanline effect that worsens with cycles
  if (cycle > 3) {
    const scanlineAlpha = Math.min(0.15, cycle * 0.008);
    for (let y = 0; y < H; y += 3) {
      ctx.fillStyle = `rgba(0,0,0,${scanlineAlpha})`;
      ctx.fillRect(0, y, W, 1);
    }
  }
  
  // Glitch blocks at high degradation
  if (cycle > 8) {
    const glitchCount = Math.min(5, Math.floor((cycle - 8) / 3));
    for (let g = 0; g < glitchCount; g++) {
      if (Math.random() < 0.1) {
        const gx = Math.random() * W;
        const gy = Math.random() * H;
        const gw = 20 + Math.random() * 80;
        const gh = 2 + Math.random() * 8;
        ctx.fillStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.1)`;
        ctx.fillRect(gx, gy, gw, gh);
      }
    }
  }
  
  requestAnimationFrame(draw);
}

// Input handlers
function handleStart(e) {
  e.preventDefault();
  initAudio();
  holding = true;
}

function handleEnd(e) {
  e.preventDefault();
  if (holding && holdStrength < 0.3) {
    // Short tap = trigger compression cycle
    triggerCycle();
  }
  holding = false;
}

canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('touchstart', handleStart, { passive: false });
canvas.addEventListener('touchend', handleEnd, { passive: false });

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    initAudio();
    cycle = 0;
    generateOriginal();
    cycleEl.textContent = 'cycle 0';
    fidelityEl.textContent = 'fidelity 100%';
    fidelityEl.style.color = 'rgba(255,255,255,0.3)';
    if (droneOsc) {
      droneOsc.frequency.setTargetAtTime(55, audioCtx.currentTime, 0.3);
      droneGain.gain.setTargetAtTime(0.06, audioCtx.currentTime, 0.3);
      noiseGain.gain.setTargetAtTime(0.005, audioCtx.currentTime, 0.3);
    }
  }
});

window.addEventListener('resize', () => { resize(); generateOriginal(); });

resize();
generateOriginal();
draw();
</script>
</body>
</html>
