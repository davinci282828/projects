<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Chamber</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            overflow: hidden;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            line-height: 1.6;
            pointer-events: none;
            user-select: none;
        }
        #info span {
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">
        <div><span>TOUCH/CLICK</span> to create ripples</div>
        <div><span>SPACE</span> clear all echoes</div>
        <div><span>D</span> toggle decay rate</div>
        <div><span>R</span> toggle resonance</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let ripples = [];
        let decayMode = 'normal'; // normal, slow, fast
        let resonanceEnabled = true;
        
        // Audio setup
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.3;
        masterGain.connect(audioCtx.destination);
        
        // Reverb
        const convolver = audioCtx.createConvolver();
        const reverbGain = audioCtx.createGain();
        reverbGain.gain.value = 0.4;
        convolver.connect(reverbGain);
        reverbGain.connect(masterGain);
        
        // Create impulse response for reverb
        function createReverbImpulse() {
            const length = audioCtx.sampleRate * 3;
            const impulse = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
            for (let channel = 0; channel < 2; channel++) {
                const data = impulse.getChannelData(channel);
                for (let i = 0; i < length; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
                }
            }
            return impulse;
        }
        convolver.buffer = createReverbImpulse();
        
        // Ambient drone
        const droneOsc1 = audioCtx.createOscillator();
        const droneOsc2 = audioCtx.createOscillator();
        const droneFilter = audioCtx.createBiquadFilter();
        const droneGain = audioCtx.createGain();
        
        droneOsc1.type = 'sine';
        droneOsc2.type = 'sine';
        droneOsc1.frequency.value = 55; // A1
        droneOsc2.frequency.value = 82.5; // E2
        droneFilter.type = 'lowpass';
        droneFilter.frequency.value = 400;
        droneFilter.Q.value = 5;
        droneGain.gain.value = 0.15;
        
        droneOsc1.connect(droneFilter);
        droneOsc2.connect(droneFilter);
        droneFilter.connect(droneGain);
        droneGain.connect(masterGain);
        droneOsc1.start();
        droneOsc2.start();
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        class Ripple {
            constructor(x, y, intensity = 1.0) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.min(width, height) * 0.6;
                this.age = 0;
                this.intensity = intensity;
                this.baseFreq = 200 + (y / height) * 400; // Vertical position = pitch
                this.hue = (x / width) * 360; // Horizontal position = color
                
                // Create sound
                this.createSound();
            }
            
            createSound() {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                
                osc.type = 'sine';
                osc.frequency.value = this.baseFreq;
                filter.type = 'bandpass';
                filter.frequency.value = this.baseFreq * 2;
                filter.Q.value = 10;
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2 * this.intensity, audioCtx.currentTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(convolver);
                gain.connect(masterGain);
                
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 2);
            }
            
            update(dt) {
                const decayRates = {
                    normal: 0.003,
                    slow: 0.001,
                    fast: 0.008
                };
                
                this.age += dt;
                this.radius += dt * 200; // Expand at constant rate
                this.intensity -= decayRates[decayMode] * dt * 60;
                
                // Update drone based on total system energy
                const energyFactor = ripples.reduce((sum, r) => sum + r.intensity, 0) / ripples.length;
                if (energyFactor) {
                    droneFilter.frequency.setTargetAtTime(
                        200 + energyFactor * 600,
                        audioCtx.currentTime,
                        0.1
                    );
                    droneGain.gain.setTargetAtTime(
                        0.1 + energyFactor * 0.15,
                        audioCtx.currentTime,
                        0.1
                    );
                }
                
                return this.intensity > 0 && this.radius < this.maxRadius;
            }
            
            draw() {
                const alpha = Math.max(0, this.intensity);
                
                // Draw expanding circle
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 60%, ${alpha * 0.6})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // Draw fading center
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 30);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, ${alpha * 0.4})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 80%, 70%, 0)`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 30, 0, Math.PI * 2);
                ctx.fill();
            }
            
            checkInterference(other) {
                if (!resonanceEnabled) return false;
                
                const dx = this.x - other.x;
                const dy = this.y - other.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // If ripples intersect
                if (Math.abs(this.radius - other.radius) < 30 && dist < this.radius + other.radius) {
                    return true;
                }
                return false;
            }
        }
        
        function createRipple(x, y, intensity = 1.0) {
            const ripple = new Ripple(x, y, intensity);
            ripples.push(ripple);
            
            // Resume audio context on first interaction
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        // Check for interference and create resonance ripples
        function checkResonance() {
            if (!resonanceEnabled) return;
            
            for (let i = 0; i < ripples.length; i++) {
                for (let j = i + 1; j < ripples.length; j++) {
                    if (ripples[i].checkInterference(ripples[j])) {
                        // Create a new ripple at the midpoint with combined intensity
                        const mx = (ripples[i].x + ripples[j].x) / 2;
                        const my = (ripples[i].y + ripples[j].y) / 2;
                        const combinedIntensity = Math.min(
                            (ripples[i].intensity + ripples[j].intensity) * 0.4,
                            1.0
                        );
                        
                        // Only spawn if not too many ripples and intensity is significant
                        if (ripples.length < 50 && combinedIntensity > 0.2) {
                            createRipple(mx, my, combinedIntensity);
                        }
                    }
                }
            }
        }
        
        let lastTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            
            // Fade to black
            ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // Update and draw ripples
            ripples = ripples.filter(ripple => {
                const alive = ripple.update(dt);
                if (alive) ripple.draw();
                return alive;
            });
            
            // Check for resonance every few frames
            if (Math.random() < 0.3) {
                checkResonance();
            }
        }
        animate();
        
        // Input handling
        function handleInput(x, y) {
            createRipple(x, y);
        }
        
        canvas.addEventListener('mousedown', (e) => {
            handleInput(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            Array.from(e.touches).forEach(touch => {
                handleInput(touch.clientX, touch.clientY);
            });
        });
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                ripples = [];
            } else if (e.key === 'd' || e.key === 'D') {
                const modes = ['normal', 'slow', 'fast'];
                const idx = modes.indexOf(decayMode);
                decayMode = modes[(idx + 1) % modes.length];
                console.log('Decay mode:', decayMode);
            } else if (e.key === 'r' || e.key === 'R') {
                resonanceEnabled = !resonanceEnabled;
                console.log('Resonance:', resonanceEnabled);
            }
        });
    </script>
</body>
</html>
