<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Counter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Counter">
      <h1 class="title">Counter</h1>

      <div class="counter" role="group" aria-label="Counter controls">
        <button id="decrement" class="btn" type="button" aria-label="Decrement">
          −
        </button>

        <output id="count" class="count" aria-live="polite" aria-atomic="true">0</output>

        <button id="increment" class="btn" type="button" aria-label="Increment">
          +
        </button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
